services:
  postgres:
    image: postgres:16-alpine
    container_name: url_shortener_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5640}:5432"
    environment:
      POSTGRES_USER: DB_USERNAME
      POSTGRES_PASSWORD: DB_PASSWORD
      POSTGRES_DB: DB_DATABASE
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
